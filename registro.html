<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidad Elite - Registro Completo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0b0b;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle, #1a150d 0%, #0b0b0b 100%);
            flex-direction: column;
            padding: 40px 20px;
        }

        .container {
            background-color: #121212;
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 600px; /* Un poco más ancho para que quepa todo cómodo */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #d4af37;
            text-align: center;
            margin-bottom: 20px;
        }

        h2 {
            color: #d4af37;
            font-size: 2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        p.subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Diseño en dos columnas para campos cortos */
        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
            flex: 1;
        }

        label {
            display: block;
            color: #d4af37;
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        .btn-registrar {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #d4af37 0%, #aa841b 100%);
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }

        .btn-registrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        .btn-ver {
            width: 100%;
            padding: 10px;
            background-color: transparent;
            border: 1px solid #d4af37;
            border-radius: 8px;
            color: #d4af37;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .btn-ver:hover {
            background-color: #d4af37;
            color: #000;
        }

        .lista-usuarios {
            margin-top: 20px;
            text-align: left;
            background-color: #1a1a1a;
            border-radius: 8px;
            padding: 15px;
            display: none;
            border: 1px solid #333;
            max-height: 400px;
            overflow-y: auto;
        }

        .usuario-item {
            padding: 12px 0;
            border-bottom: 1px solid #333;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .usuario-item:last-child {
            border-bottom: none;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Únete a la Comunidad</h2>
        <p class="subtitle">unete a la comunidad de la JAC San Francisco</p>

        <form id="registroForm">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Ej. Mateo López" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="identificacion">N° Identificación</label>
                    <input type="text" id="identificacion" placeholder="Ej. 1087344..." required>
                </div>
                <div class="form-group">
                    <label for="lugar_expedicion">Lugar de Expedición</label>
                    <input type="text" id="lugar_expedicion" placeholder="Ej. Popayán" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="telefono">Teléfono / Celular</label>
                    <input type="tel" id="telefono" placeholder="Ej. 312765..." required>
                </div>
                <div class="form-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" placeholder="correo@ejemplo.com" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="estudios">Estudios Realizados</label>
                    <input type="text" id="estudios" placeholder="Ej. Bachiller, Técnico..." required>
                </div>
                <div class="form-group">
                    <label for="ocupacion">Ocupación Actual</label>
                    <input type="text" id="ocupacion" placeholder="Ej. Estudiante, Barbero..." required>
                </div>
            </div>

    
            </div>

            <div class="form-group">
                <label for="genero">¿Cuál es tu género?</label>
                <select id="genero" required>
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Femenino">Femenino</option>
                    <option value="LGBTQ+">LGBTQ+</option>
                </select>
            </div>
        </div>
                <div class="form-group">
                    <label for="discapacidad">¿Presenta alguna Discapacidad?</label>
                    <select id="discapacidad" required>
                        <option value="" disabled selected>Selecciona</option>
                        <option value="No">No</option>
                        <option value="Sí">Sí</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-registrar">Registrarse</button>
        </form>

        <button id="btnVerUsuarios" class="btn-ver">👁️ Ver Miembros Guardados</button>
        
        <div id="contenedorLista" class="lista-usuarios">
            <h3 style="color: #d4af37; font-size: 1rem; margin-bottom: 10px;">Miembros Registrados:</h3>
            <div id="listaContenido"></div>
        </div>
    </div>
    <script>
    var API_EXCEL = "https://api.sheetbest.com/sheets/b0ea9caf-f675-489f-9cae-feaef4dad973";

        // 1. FUNCIÓN PARA REGISTRAR USUARIOS DIRECTO EN EXCEL
        document.getElementById('registroForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            var datos = {
                nombre: document.getElementById('nombre').value,
               rol: "Comunidad", //  Dejándola así, en tu Excel se seguirá escribiendo la palabra "Comunidad" automáticamente
                identificacion: document.getElementById('identificacion').value,
                lugar_expedicion: document.getElementById('lugar_expedicion').value,
                estudios: document.getElementById('estudios').value,
                ocupacion: document.getElementById('ocupacion').value,
                genero: document.getElementById('genero').value,
                discapacidad: document.getElementById('discapacidad').value,
                telefono: document.getElementById('telefono').value,
                correo: document.getElementById('correo').value
            };

            try {
                var respuesta = await fetch(API_EXCEL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                if (respuesta.ok) {
                    alert('¡Éxito! Miembro registrado permanentemente en la base de datos.');
                    document.getElementById('registroForm').reset();
                } else {
                    alert('Error al guardar en el servidor de Excel.');
                }
            } catch (error) {
                alert('Error al conectar con la base de datos.');
            }
        });

        // 2. FUNCIÓN PARA VER LOS USUARIOS GUARDADOS EN PÁGINA
        document.getElementById('btnVerUsuarios').addEventListener('click', async function() {
            try {
                var respuesta = await fetch(API_EXCEL);
                var usuarios = await respuesta.json();
                
                if (respuesta.ok) {
                    var contenedor = document.getElementById('listaUsuarios');
                    if (!contenedor) {
                        alert('Usuarios cargados correctamente. Revisa tu archivo de Google Sheets.');
                        return;
                    }
                    
                    contenedor.innerHTML = ''; // Limpiar la lista antes de mostrar

                    if (usuarios.length === 0) {
                        contenedor.innerHTML = '<p style="text-align:center;">No hay usuarios registrados aún.</p>';
                        return;
                    }

                    // Dibujar cada usuario en pantalla con el diseño dorado elegante
                    usuarios.forEach(function(u) {
                        var tarjeta = document.createElement('div');
                        tarjeta.style.background = '#1a1a1a';
                        tarjeta.style.border = '1px solid #d4af37';
                        tarjeta.style.padding = '15px';
                        tarjeta.style.marginBottom = '10px';
                        tarjeta.style.borderRadius = '5px';

                        tarjeta.innerHTML = `
                            <p style="margin: 0; font-weight: bold; color: #d4af37; font-size: 16px;">${u.nombre || 'Sin nombre'}</p>
                            <p style="margin: 5px 0 0 0; font-size: 14px; color: white;"><strong>Rol:</strong> ${u.rol || ''} | <strong>Género:</strong> ${u.genero || ''}</p>
                            <p style="margin: 5px 0 0 0; font-size: 14px; color: white;"><strong>Cédula:</strong> ${u.identificacion || ''} (${u.lugar_expedicion || ''})</p>
                            <p style="margin: 5px 0 0 0; font-size: 14px; color: #aaa;"><strong>Teléfono:</strong> ${u.telefono || ''} | <strong>Correo:</strong> ${u.correo || ''}</p>
                        `;
                        contenedor.appendChild(tarjeta);
                    });
                } else {
                    alert('Error al leer la base de datos.');
                }
            } catch (error) {
                alert('Error de conexión al leer usuarios.');
            }
        });
    </script> </body>
</html>
